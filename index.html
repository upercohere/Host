<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uperco - Under Construction</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #5170ff;
    --dark: #000000;
    --light: #ffffff;
    --text-gray: #555555;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: var(--light);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

/* Mouse glow effect */
.cursor-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(81,112,255,0.15) 0%, rgba(81,112,255,0.05) 40%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease;
    z-index: 0;
}

.container {
    text-align: center;
    max-width: 600px;
    padding: 40px;
    position: relative;
    z-index: 1;
    animation: fadeIn 1.2s ease forwards;
}

.logo {
    width: 220px;
    margin-bottom: 30px;
}

h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 15px;
}

.highlight {
    color: var(--primary);
}

p {
    font-size: 16px;
    color: var(--text-gray);
    line-height: 1.6;
    font-weight: 300;
}

/* Fade animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Responsive */
@media (max-width: 600px) {
    .logo {
        width: 170px;
    }

    h1 {
        font-size: 22px;
    }

    p {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="container">
    <img src="uperco_logo.png" alt="Uperco Logo" class="logo">
    
    <h1>Website <span class="highlight">Under Construction</span></h1>
    
    <p>
        We are working hard to progress and allow you to save money as soon as possible.
        Something exciting is coming. Stay tuned.
    </p>
</div>

<script>
const glow = document.getElementById('cursorGlow');

let mouseX = 0;
let mouseY = 0;
let currentX = 0;
let currentY = 0;

// Track real mouse position
document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

// Smooth follow animation
function animate() {
    // The lower this number, the slower the glow follows (0.05 = slower, 0.15 = faster)
    const speed = 0.08;

    currentX += (mouseX - currentX) * speed;
    currentY += (mouseY - currentY) * speed;

    glow.style.left = currentX + "px";
    glow.style.top = currentY + "px";

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
